<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Beer Analytics{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body class="min-h-full bg-stone-50 text-stone-800 flex flex-col">

    <nav class="bg-amber-700 text-white px-4 py-3 flex items-center justify-between">
        <a href="/" class="font-bold text-lg tracking-tight">🍺 Beer Analytics</a>
        <div class="flex gap-4 text-sm items-center">
            <a href="/" class="hover:underline">Home</a>
            <a href="/about/" class="hover:underline">About</a>
            <form method="post" action="{% url 'toggle_units' %}" class="inline">
                {% csrf_token %}
                <button type="submit" class="bg-amber-600 px-2 py-1 rounded text-xs hover:bg-amber-500 transition">
                    {% if is_metric %}L/kg/°C{% else %}gal/lb/°F{% endif %}
                </button>
            </form>
        </div>
    </nav>

    <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-stone-200 text-center text-xs text-stone-400 py-4 mt-8">
        <p>Beer Analytics — data from open recipe archives</p>
        <p class="text-stone-300 text-xs">Minimal India-friendly edition</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
